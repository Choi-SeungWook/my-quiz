<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>영어 문장 퀴즈 Pro+</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; padding: 0; margin: 0; 
            background-color: #121212; color: #e0e0e0; 
            height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-tap-highlight-color: transparent; overflow: hidden; 
        }
        /* 상단 바 설정 */
        #top-bar {
            position: fixed; top: env(safe-area-inset-top, 10px); 
            left: 0; right: 0; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000;
        }
        #timer-display {
            background: rgba(255, 255, 255, 0.1); color: #ffffff; padding: 5px 15px;
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
        .home-icon-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 50%; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(5px); font-size: 1.1rem;
        }

        #setup, .quiz-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; max-width: 450px; display: flex; flex-direction: column; align-items: center; 
        }
        .setup-card {
            background: #1e1e1e; width: 100%; padding: 15px 20px; border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5); box-sizing: border-box; border: 1px solid #333;
        }
        h2 { color: #fff; margin: 0 0 10px 0; font-size: 1.4rem; }
        #total-info { font-size: 0.85rem; margin-bottom: 10px !important; }

        .option-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 12px; margin: 8px 0; background: #252525; padding: 10px; border-radius: 12px; }
        .option-item { display: flex; align-items: center; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: #ccc; }
        .option-item input { width: 15px; height: 15px; margin-right: 5px; filter: invert(1); }
        .option-title { width: 100%; font-size: 0.75rem; color: #888; margin-bottom: 4px; font-weight: bold; }
        
        input[type="text"] { padding: 12px; width: 85%; font-size: 1rem; border: 2px solid #444; background-color: #2c2c2c; color: #fff; border-radius: 12px; margin-bottom: 8px; outline: none; text-align: center; }
        
        .info-progress { font-size: 0.85rem; color: #999; margin-bottom: 10px; }
        .card { background: #1e1e1e; width: 100%; padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: relative; box-sizing: border-box; cursor: pointer; border: 1px solid #333; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .kor-text { font-size: 1.3rem; font-weight: bold; color: #ffffff; margin-bottom: 15px; line-height: 1.4; word-break: keep-all; }
        .eng-text { font-size: 1.25rem; color: #4ade80; font-weight: 600; min-height: 1.5em; }
        .hint-msg { color: #666; font-size: 0.8rem; margin-top: 20px; }
        
        .controls { width: 100%; margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btns { display: flex; gap: 8px; width: 100%; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .start-btn { padding: 12px; background: #0062cc; color: white; width: 100%; font-size: 1rem; margin-top: 5px; }
        .review-start-btn { padding: 12px; background: #8e44ad; color: white; width: 100%; font-size: 1rem; margin-top: 2px; }
        .review-start-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .pause-btn { padding: 12px; background: #f39c12; color: white; width: 100%; font-size: 1rem; }
        .pause-btn.resume { background: #27ae60; }

        .sync-btn { flex: 1; padding: 8px; background: #2c3e50; color: #bdc3c7; font-size: 0.75rem; border-radius: 8px; border:none; }
        .nav-btn { flex: 1; padding: 10px; background: #333; color: white; font-size: 0.85rem; }
        .dont-know-btn { padding: 10px; background: transparent; color: #ff6b6b; border: 2px solid #ff6b6b; font-size: 0.85rem; width: 100%; }
    </style>
</head>
<body>

    <div id="top-bar" style="display:none;">
        <div class="home-icon-btn" onclick="goHome()">🏠</div>
        <div id="timer-display">00:00</div>
        <div style="width:35px;"></div> </div>

    <div id="setup">
        <div class="setup-card">
            <h2>🎯 영어 퀴즈 설정</h2>
            <p id="total-info" style="color:#ff6b6b; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px;">데이터 로드 중...</p>
            
            <input type="text" id="page-input" placeholder="장 번호 (예: 1, 3-5)" onkeydown="if(event.key==='Enter') startQuiz('normal')">
            
            <div class="option-group">
                <div class="option-title">재생 순서</div>
                <label class="option-item"><input type="radio" name="order" value="seq" checked> 순차</label>
                <label class="option-item"><input type="radio" name="order" value="rand"> 랜덤</label>
            </div>

            <div class="option-group">
                <div class="option-title">모드 설정</div>
                <label class="option-item"><input type="checkbox" id="auto-mode"> ⚡ 깜빡이</label>
                <label class="option-item"><input type="checkbox" id="tts-mode"> 🔊 음성</label>
            </div>

            <div class="option-group" id="speed-options">
                <div class="option-title">깜빡이 간격</div>
                <label class="option-item"><input type="radio" name="speed" value="2000" checked> 2초</label>
                <label class="option-item"><input type="radio" name="speed" value="3000"> 3초</label>
                <label class="option-item"><input type="radio" name="speed" value="4000"> 4초</label>
                <label class="option-item"><input type="radio" name="speed" value="5000"> 5초</label>
            </div>

            <button class="btn start-btn" onclick="startQuiz('normal')">학습 시작하기</button>
            <button id="review-btn" class="btn review-start-btn" onclick="startQuiz('review')">❌ 모르는 문장 복습 (0)</button>
            
            <div style="display:flex; gap:8px; margin-top:10px; width:100%;">
                <button class="sync-btn" onclick="syncToGithub()">📤 내보내기</button>
                <button class="sync-btn" onclick="fetchFromGithub()">📥 가져오기</button>
            </div>
        </div>
    </div>

    <div id="quiz" class="quiz-container" style="display:none;">
        <div class="info-progress" id="progress"></div>
        <div class="card" id="quiz-card" onclick="handleMainAction()">
            <div class="kor-text" id="kor-text"></div>
            <div class="eng-text" id="eng-text" style="visibility: hidden;"></div>
            <div class="hint-msg" id="hint-msg">터치/엔터: 정답 보기</div>
        </div>
        <div class="controls">
            <button id="pause-btn" class="btn pause-btn" onclick="togglePause(event)" style="display:none;">⏸ 일시정지</button>
            <button id="fail-btn" class="btn dont-know-btn" onclick="toggleFailedList(event)">이 문장 잘 몰라요 (체크)</button>
            <div class="nav-btns">
                <button id="prev-btn" class="btn nav-btn" onclick="moveQuestion(-1)">◀ 이전</button>
                <button id="next-btn" class="btn nav-btn" onclick="moveQuestion(1)">다음 ▶</button>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'Choi-SeungWook'; 
        const REPO = 'my-quiz';      
        const DATA_FILE = 'English_Sentences.txt';
        const STORAGE_KEY = 'failed_sentences';
        const FILE_PATH = 'failed_list.json';

        let allData = [], quizList = [], currentIndex = 0;
        let isShowingAnswer = false, startTime, timerInterval, autoTimer;
        let config = { auto: false, tts: false, interval: 2000 };
        let isPaused = false;

        fetch(DATA_FILE).then(res => res.text()).then(text => {
            text.split(/\r?\n/).forEach(line => {
                let clean = line.trim();
                if (!clean) return;
                if (clean.includes(']')) clean = clean.split(']').pop().trim();
                const parts = clean.split(',');
                if (parts.length >= 3) {
                    const num = parseInt(parts[0].trim());
                    if (!isNaN(num)) allData.push({ num, kor: parts[1].trim(), eng: parts[2].trim() });
                }
            });
            if (allData.length > 0) {
                document.getElementById('total-info').innerText = `✅ 총 ${allData.length}문장 로드 완료`;
                document.getElementById('total-info').style.color = "#4ade80";
                updateReviewButtonCount();
            }
        });

        function getFailedIDs() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        function updateReviewButtonCount() {
            const count = getFailedIDs().length;
            const btn = document.getElementById('review-btn');
            btn.innerText = `❌ 모르는 문장 복습 (${count})`;
            btn.disabled = count === 0;
        }

        function speak(text, lang) {
            if (!config.tts) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function handleMainAction() {
            if (config.auto) return; 
            if (!isShowingAnswer) showAnswer();
            else moveQuestion(1);
        }

        function showAnswer() {
            if (isPaused) return;
            isShowingAnswer = true;
            document.getElementById('eng-text').style.visibility = 'visible';
            document.getElementById('hint-msg').innerText = config.auto ? '자동 재생 중...' : '터치/엔터: 다음 문제';
            const q = quizList[currentIndex];
            if (config.tts) speak(q.eng, 'en-US');
            if (config.auto) autoTimer = setTimeout(() => moveQuestion(1), config.interval);
        }

        function moveQuestion(step) {
            clearTimeout(autoTimer);
            if (isPaused) {
                isPaused = false;
                const pBtn = document.getElementById('pause-btn');
                pBtn.innerText = "⏸ 일시정지";
                pBtn.classList.remove('resume');
            }
            const nextIdx = currentIndex + step;
            if (nextIdx < 0) return;
            if (nextIdx >= quizList.length) { finishQuiz(); return; }
            currentIndex = nextIdx;
            isShowingAnswer = false;
            showQuestion();
        }

        function showQuestion() {
            const q = quizList[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${quizList.length}`;
            document.getElementById('kor-text').innerText = q.kor;
            document.getElementById('eng-text').innerText = q.eng;
            document.getElementById('eng-text').style.visibility = 'hidden';
            document.getElementById('hint-msg').innerText = config.auto ? '자동 재생 중...' : '터치/엔터: 정답 보기';
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerText = (currentIndex === quizList.length - 1) ? "학습 완료 🏁" : "다음 ▶";
            renderQuestionState();
            if (config.tts) speak(q.kor, 'ko-KR');
            if (config.auto && !isPaused) autoTimer = setTimeout(() => showAnswer(), config.interval);
        }

        function togglePause(event) {
            if (event) event.stopPropagation();
            isPaused = !isPaused;
            const pBtn = document.getElementById('pause-btn');
            if (isPaused) {
                clearTimeout(autoTimer);
                pBtn.innerText = "▶ 다시 시작";
                pBtn.classList.add('resume');
                document.getElementById('hint-msg').innerText = "일시정지됨";
            } else {
                pBtn.innerText = "⏸ 일시정지";
                pBtn.classList.remove('resume');
                if (!isShowingAnswer) showQuestion();
                else autoTimer = setTimeout(() => moveQuestion(1), config.interval);
            }
        }

        function goHome() {
            if (!confirm("학습을 중단하고 메인 화면으로 돌아갈까요?")) return;
            clearInterval(timerInterval);
            clearTimeout(autoTimer);
            window.speechSynthesis.cancel();
            document.getElementById('setup').style.display = 'flex';
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('top-bar').style.display = 'none';
        }

        function startQuiz(mode) {
            const order = document.querySelector('input[name="order"]:checked').value;
            config.auto = document.getElementById('auto-mode').checked;
            config.tts = document.getElementById('tts-mode').checked;
            config.interval = parseInt(document.querySelector('input[name="speed"]:checked').value);
            isPaused = false;

            if (mode === 'normal') {
                const val = document.getElementById('page-input').value.trim();
                if (!val) return alert("장 번호를 입력하세요.");
                const pages = new Set();
                val.split(',').forEach(p => {
                    if (p.includes('-')) {
                        const [s, e] = p.split('-').map(Number);
                        for (let i = Math.min(s,e); i <= Math.max(s,e); i++) pages.add(i);
                    } else pages.add(parseInt(p));
                });
                quizList = allData.filter(d => pages.has(Math.ceil(d.num / 30)));
            } else {
                const ids = getFailedIDs();
                quizList = allData.filter(d => ids.includes(d.num));
            }

            if (quizList.length === 0) return alert("해당하는 문장이 없습니다.");
            quizList.sort((a,b) => order === 'rand' ? Math.random() - 0.5 : a.num - b.num);
            currentIndex = 0;
            isShowingAnswer = false;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'flex';
            document.getElementById('top-bar').style.display = 'flex';
            
            const pBtn = document.getElementById('pause-btn');
            pBtn.style.display = config.auto ? 'block' : 'none';

            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer-display').innerText = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
            }, 1000);
            showQuestion();
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            clearTimeout(autoTimer);
            alert(`🎉 학습 완료! 소요 시간: ${document.getElementById('timer-display').innerText}`);
            location.reload();
        }

        function toggleFailedList(event) {
            if (event) event.stopPropagation();
            const q = quizList[currentIndex];
            let ids = getFailedIDs();
            if (!ids.includes(q.num)) ids.push(q.num);
            else ids = ids.filter(id => id !== q.num);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
            updateReviewButtonCount();
            renderQuestionState();
        }

        function renderQuestionState() {
            const fBtn = document.getElementById('fail-btn');
            if (getFailedIDs().includes(quizList[currentIndex].num)) {
                fBtn.style.background = "#ff6b6b"; fBtn.style.color = "#fff"; fBtn.innerText = "✓ 체크됨 (영구 저장)";
            } else {
                fBtn.style.background = "transparent"; fBtn.style.color = "#ff6b6b"; fBtn.innerText = "이 문장 잘 몰라요 (체크)";
            }
        }

        async function syncToGithub() {
            const ids = getFailedIDs();
            const token = prompt("GitHub Token:");
            if (!token) return;
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            try {
                const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
                const sha = res.ok ? (await res.json()).sha : null;
                await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "Sync", content: btoa(unescape(encodeURIComponent(JSON.stringify(ids)))), sha })
                });
                alert("✅ 서버 저장 완료");
            } catch (e) { alert("오류: " + e.message); }
        }

        async function fetchFromGithub() {
            const token = prompt("GitHub Token:");
            if (!token) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, { headers: { "Authorization": `token ${token}` } });
                if (res.ok) {
                    const ids = JSON.parse(decodeURIComponent(escape(atob((await res.json()).content))));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
                    updateReviewButtonCount(); alert("✅ 데이터를 가져왔습니다");
                }
            } catch (e) { alert("오류: " + e.message); }
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('quiz').style.display === 'flex') {
                if (e.key === 'Enter' || e.key === ' ') { 
                    e.preventDefault(); 
                    if (config.auto) togglePause();
                    else handleMainAction(); 
                }
                else if (e.key === 'ArrowLeft') moveQuestion(-1);
                else if (e.key === 'ArrowRight') moveQuestion(1);
                else if (e.key === 'Escape') goHome();
            }
        });
    </script>
</body>
</html>
